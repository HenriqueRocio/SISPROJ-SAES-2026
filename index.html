<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painéis — CGPROJ/SAES · Ministério da Saúde</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f14;--s1:#131820;--s2:#1a2230;--bd:#1f2d3d;--ac:#00e5a0;--ac2:#0099ff;--ac3:#ff6b35;--ac4:#ffd166;--tx:#e8edf3;--tm:#6b7f96;--td:#3d5068;--pur:#a855f7;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Sora',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:48px 28px 64px;}

/* HEADER */
header{margin-bottom:52px;}
.gov-bar{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--bd);}
.gov-dot{width:10px;height:10px;border-radius:50%;background:var(--ac);animation:pulse 2.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,160,.4)}50%{box-shadow:0 0 0 6px rgba(0,229,160,0)}}
.gov-name{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--tm);}
.gov-sep{color:var(--bd);margin:0 4px;}

.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);color:var(--ac);font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:14px;font-family:'DM Mono',monospace;}
h1{font-size:clamp(28px,4vw,48px);font-weight:800;letter-spacing:-.03em;line-height:1.05;margin-bottom:10px;}
h1 em{color:var(--ac);font-style:normal;}
.hero-sub{font-size:13px;color:var(--tm);font-weight:300;max-width:520px;line-height:1.6;}

/* SEARCH */
.search-section{margin-bottom:36px;}
.search-wrap{position:relative;max-width:400px;}
.search-input{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:10px 14px 10px 40px;color:var(--tx);font-size:13px;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--ac);}
.search-input::placeholder{color:var(--td);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--td);font-size:14px;pointer-events:none;}
.search-count{margin-top:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--td);}

/* SECTION LABEL */
.section-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--td);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--bd);}

/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:40px;}

/* PANEL CARD */
.panel-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:22px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:14px;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden;cursor:pointer;}
.panel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--card-color,var(--ac));opacity:.8;}
.panel-card:hover{border-color:var(--card-color,var(--ac));transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3);}
.panel-card.green{--card-color:var(--ac);}
.panel-card.blue{--card-color:var(--ac2);}
.panel-card.orange{--card-color:var(--ac3);}
.panel-card.yellow{--card-color:var(--ac4);}
.panel-card.purple{--card-color:var(--pur);}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(255,255,255,.04);border:1px solid var(--bd);flex-shrink:0;}
.card-status{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:12px;font-family:'DM Mono',monospace;}
.status-live{background:rgba(0,229,160,.1);color:var(--ac);border:1px solid rgba(0,229,160,.2);}
.status-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ac);animation:blink 1.8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.status-wip{background:rgba(255,209,102,.08);color:var(--ac4);border:1px solid rgba(255,209,102,.2);}
.status-draft{background:rgba(61,80,104,.2);color:var(--td);border:1px solid var(--bd);}

.card-title{font-size:14px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px;}
.card-desc{font-size:11px;color:var(--tm);line-height:1.5;}

.card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
.meta-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--td);background:var(--s2);border:1px solid var(--bd);padding:2px 7px;border-radius:4px;}

.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--bd);}
.card-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--td);}
.card-arrow{font-size:14px;color:var(--card-color,var(--ac));opacity:.7;transition:opacity .2s,transform .2s;}
.panel-card:hover .card-arrow{opacity:1;transform:translateX(4px);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--td);font-size:12px;}

/* FOOTER */
footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
footer span{font-family:'DM Mono',monospace;font-size:10px;color:var(--td);}
.footer-logo{display:flex;align-items:center;gap:8px;}
.footer-logo-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);}

@media(max-width:600px){h1{font-size:28px;}.wrap{padding:28px 16px 48px;}.cards-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">

  <!-- GOV BAR -->
  <div class="gov-bar">
    <div class="gov-dot"></div>
    <span class="gov-name">Ministério da Saúde</span>
    <span class="gov-sep">/</span>
    <span class="gov-name">SAES</span>
    <span class="gov-sep">/</span>
    <span class="gov-name">CGPROJ</span>
  </div>

  <!-- HERO -->
  <header>
    <div class="hero-badge">Painéis Analíticos</div>
    <h1>Dashboards<br><em>CGPROJ / SAES</em></h1>
    <p class="hero-sub">Painéis interativos de acompanhamento de projetos, execução financeira e gestão de pessoas da Coordenação-Geral de Projetos.</p>
  </header>

  <!-- SEARCH -->
  <div class="search-section">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar painel...">
    </div>
    <div class="search-count" id="searchCount"></div>
  </div>

  <!-- CARDS -->
  <div class="section-label" id="sectionLabel">Painéis disponíveis</div>
  <div class="cards-grid" id="cardsGrid"></div>

  <footer>
    <div class="footer-logo">
      <div class="footer-logo-dot"></div>
      <span>CGPROJ · SAES · Ministério da Saúde</span>
    </div>
    <span id="footerDate"></span>
  </footer>
</div>

<script>
// ── CADASTRO DOS PAINÉIS ───────────────────────────────────────────────────
// Para adicionar um novo painel, basta adicionar um objeto nesta lista.
var PANELS = [
  {
    id: '',
    title: 'Registros de Ponto',
    desc: 'Acompanhamento de horas trabalhadas, localização de registros e ranking de colaboradores. Filtro individual por colaborador com histórico completo.',
    icon: '⏱',
    file: 'controle_ponto_v2.html',
    status: 'live',      // live | wip | draft
    color: 'green',
    tags: ['Pontomais', 'SAES-M11', '306 colaboradores', 'Jan–Mar 2026'],
    date: '05/03/2026',
  },
  {
    id: 'OPAS',
    title: 'Execução Financeira OPAS',
    desc: 'Dashboard de gastos por Termo Aditivo (TA1, TA3, TA4, TA5) com visão de contratos PF, PJ, passagens e diárias.',
    icon: '💰',
    file: 'relatorio_gastos_OPAS.jsx',   // troque pelo nome real do seu arquivo
    status: 'wip',
    color: 'purple',
    tags: ['TC-105-2019', 'OPAS/OMS', 'TED', 'TC-089-15', 'Matrizes Lógicas'],
    date: '2026',
  },
  {
    id: 'pronon',
    title: 'PRONON',
    desc: 'Programa Nacional de Apoio à Atenção Oncológica — acompanhamento de execução financeira, projetos habilitados e metas por unidade conveniada.',
    icon: '🎗',
    file: 'Pronon.html',
    status: 'live',
    color: 'green',
    tags: ['PRONON', 'Oncologia', 'Convênios', 'SAES'],
    date: '2026',
  },
  {
    id: 'teds',
    title: 'Termos de Execução Descentralizada',
    desc: 'Painel de acompanhamento de TEDs vigentes — execução orçamentária, financeira e física por parceiro, produto e etapa.',
    icon: '📋',
    file: 'painel_teds.html',
    status: 'wip',
    color: 'yellow',
    tags: ['TED', 'Descentralização', 'OPAS', 'Execução'],
    date: '2026',
  },
  {
    id: 'proadi',
    title: 'PROADI-SUS',
    desc: 'Programa de Apoio ao Desenvolvimento Institucional do SUS — monitoramento de projetos, instituições parceiras, produtos entregues e investimentos.',
    icon: '🏥',
    file: 'painel_proadi.html',
    status: 'wip',
    color: 'orange',
    tags: ['PROADI-SUS', 'Hospitais de Excelência', 'P&D', 'SUS'],
    date: '2026',
  },
  // ── ADICIONE NOVOS PAINÉIS AQUI ──────────────────────────────────────────
  // {
  //   id: 'novo',
  //   title: 'Nome do Painel',
  //   desc: 'Descrição breve do que o painel mostra.',
  //   icon: '📊',
  //   file: 'nome_do_arquivo.html',
  //   status: 'wip',
  //   color: 'orange',
  //   tags: ['Tag1', 'Tag2'],
  //   date: '2026',
  // },
];

// ── STATUS LABELS ─────────────────────────────────────────────────────────
var STATUS = {
  live:  {cls:'status-live',  label:'Disponível'},
  wip:   {cls:'status-wip',   label:'Em construção'},
  draft: {cls:'status-draft', label:'Rascunho'},
};

// ── RENDER ────────────────────────────────────────────────────────────────
function render(filter) {
  filter = (filter||'').toLowerCase();
  var grid = document.getElementById('cardsGrid');
  var label = document.getElementById('sectionLabel');
  var count = document.getElementById('searchCount');
  var filtered = PANELS.filter(function(p){
    return !filter
      || p.title.toLowerCase().indexOf(filter) !== -1
      || p.desc.toLowerCase().indexOf(filter) !== -1
      || p.tags.join(' ').toLowerCase().indexOf(filter) !== -1;
  });

  count.textContent = filter ? filtered.length + ' de ' + PANELS.length + ' painéis encontrados' : '';
  label.textContent = filter ? 'Resultados' : 'Painéis disponíveis';

  grid.innerHTML = '';

  if(!filtered.length) {
    grid.innerHTML = '<div class="empty-state">Nenhum painel encontrado para "<strong>' + filter + '</strong>"</div>';
    return;
  }

  filtered.forEach(function(p){
    var st = STATUS[p.status] || STATUS.draft;
    var tagsHtml = p.tags.map(function(t){
      return '<span class="meta-tag">' + t + '</span>';
    }).join('');

    var card = document.createElement('a');
    card.className = 'panel-card ' + p.color;
    card.href = p.file;
    card.setAttribute('data-id', p.id);
    card.innerHTML =
      '<div class="card-top">'
        + '<div class="card-icon">' + p.icon + '</div>'
        + '<span class="card-status ' + st.cls + '">' + st.label + '</span>'
      + '</div>'
      + '<div>'
        + '<div class="card-title">' + p.title + '</div>'
        + '<div class="card-desc">' + p.desc + '</div>'
      + '</div>'
      + '<div class="card-meta">' + tagsHtml + '</div>'
      + '<div class="card-footer">'
        + '<span class="card-date">Atualizado: ' + p.date + '</span>'
        + '<span class="card-arrow">&#8594;</span>'
      + '</div>';
    grid.appendChild(card);
  });
}

// ── SEARCH ────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function(e){
  render(e.target.value);
});

// ── FOOTER DATE ───────────────────────────────────────────────────────────
var now = new Date();
document.getElementById('footerDate').textContent =
  'Gerado em ' + now.toLocaleDateString('pt-BR') + ' · ' + PANELS.length + ' painéis cadastrados';

// ── INIT ──────────────────────────────────────────────────────────────────
render('');
</script>
</body>
</html>
