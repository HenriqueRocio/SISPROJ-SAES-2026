<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Integrado TED — CGPROJ · SAES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#050d1a;--bg2:#07111f;--bg3:#0a1828;
  --card:#0c1a2e;--card2:#0f2040;
  --border:#162e50;--border2:#1e4070;
  --accent:#0e7fd4;--accent2:#1aa0ff;--accent3:#40bfff;
  --green:#00c97a;--green2:#009a5c;
  --yellow:#f0b429;--yellow2:#c88f10;
  --orange:#f57c00;--red:#e53935;--purple:#8b5cf6;--teal:#00acc1;
  --text:#b8cfe8;--text2:#6b8ab0;--text3:#4a6a90;--white:#ddeeff;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--r2:8px;--r3:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.topbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:400}
.tb-left{display:flex;align-items:center;gap:12px}
.tb-logo{width:34px;height:34px;border-radius:7px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:12px;color:#fff}
.tb-title{font-size:14.5px;font-weight:600;color:var(--white)}
.tb-sub{font-size:9.5px;color:var(--text2);font-family:var(--mono)}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-badge{display:flex;align-items:center;gap:5px;background:rgba(0,201,122,.08);border:1px solid rgba(0,201,122,.2);border-radius:20px;padding:3px 10px;font-size:9.5px;font-family:var(--mono);color:var(--green)}
.tb-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}
.dept-strip{background:var(--bg3);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;overflow-x:auto}
.dept-strip::-webkit-scrollbar{height:3px}
.dept-strip::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.ds-btn{padding:12px 16px;font-size:11.5px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;display:flex;align-items:center;gap:6px;flex-shrink:0}
.ds-btn:hover{color:var(--text)}
.ds-btn.active{color:var(--accent3);border-bottom-color:var(--accent3)}
.ds-cnt{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:10px;background:rgba(14,127,212,.15);color:var(--accent2)}
.ds-btn.active .ds-cnt{background:rgba(64,191,255,.2);color:var(--accent3)}
.ds-btn.alert .ds-cnt{background:rgba(229,57,53,.15);color:var(--red)}
.content{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 13px 9px;position:relative;overflow:hidden;transition:border-color .18s,transform .15s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.kb::before{background:linear-gradient(90deg,var(--accent),var(--accent3))}
.kpi.kg::before{background:linear-gradient(90deg,var(--green2),var(--green))}
.kpi.ky::before{background:linear-gradient(90deg,var(--yellow2),var(--yellow))}
.kpi.kr::before{background:linear-gradient(90deg,#c02020,var(--red))}
.kpi.ko::before{background:linear-gradient(90deg,#c06000,var(--orange))}
.kpi.kp::before{background:linear-gradient(90deg,#6d3fe0,var(--purple))}
.kpi.kt::before{background:linear-gradient(90deg,#007a8a,var(--teal))}
.kl{font-size:9px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px}
.kv{font-size:19px;font-weight:700;color:var(--white);margin:3px 0 1px;line-height:1}
.ks{font-size:9.5px;color:var(--text3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.mhdr{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.mhdr-t{font-size:12px;font-weight:600;color:var(--white)}
.mhdr-s{font-size:9.5px;color:var(--text2);font-family:var(--mono);margin-left:auto}
.dept-header{background:linear-gradient(135deg,var(--card2) 0%,var(--card) 100%);border:1px solid var(--border2);border-radius:var(--r);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.dept-header::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--accent),var(--accent3));border-radius:var(--r) 0 0 var(--r)}
.dh-l{margin-left:12px}
.dh-name{font-size:21px;font-weight:700;color:var(--white)}
.dh-full{font-size:11.5px;color:var(--text2);margin-top:2px}
.dh-r{display:flex;gap:8px;flex-wrap:wrap}
.dh-st{text-align:center;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r2);padding:8px 14px;min-width:80px}
.dh-sv{font-size:17px;font-weight:700;font-family:var(--mono);color:var(--white)}
.dh-sl{font-size:9px;color:var(--text2);margin-top:2px}
.alert-box{background:rgba(229,57,53,.06);border:1px solid rgba(229,57,53,.18);border-left:3px solid var(--red);border-radius:var(--r2);padding:9px 12px;display:flex;gap:8px}
.alert-box.warn{background:rgba(240,180,41,.06);border-color:rgba(240,180,41,.18);border-left-color:var(--yellow)}
.ab-h{font-size:11px;font-weight:600;color:var(--white)}
.ab-p{font-size:10px;color:var(--text2)}
.prog-row{display:flex;flex-direction:column;gap:7px}
.ph{display:flex;justify-content:space-between;margin-bottom:2px}
.pl{font-size:10px;color:var(--text2)}
.pv{font-size:10px;font-family:var(--mono);font-weight:600;color:var(--text)}
.bar{height:4px;background:rgba(20,40,70,.8);border-radius:2px;overflow:hidden}
.fill{height:100%;border-radius:2px}
.fill.b{background:linear-gradient(90deg,var(--accent),var(--accent3))}
.fill.g{background:linear-gradient(90deg,var(--green2),var(--green))}
.fill.y{background:linear-gradient(90deg,var(--yellow2),var(--yellow))}
.fill.o{background:linear-gradient(90deg,#c06000,var(--orange))}
.fill.r{background:linear-gradient(90deg,#c02020,var(--red))}
.b-tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-size:9.5px;font-family:var(--mono);font-weight:600;white-space:nowrap}
.t-g{background:rgba(0,201,122,.1);color:var(--green);border:1px solid rgba(0,201,122,.25)}
.t-b{background:rgba(14,127,212,.1);color:var(--accent2);border:1px solid rgba(14,127,212,.25)}
.t-a{background:rgba(64,191,255,.1);color:var(--accent3);border:1px solid rgba(64,191,255,.25)}
.t-y{background:rgba(240,180,41,.1);color:var(--yellow);border:1px solid rgba(240,180,41,.25)}
.t-r{background:rgba(229,57,53,.1);color:var(--red);border:1px solid rgba(229,57,53,.25)}
.t-m{background:rgba(100,130,170,.08);color:var(--text2);border:1px solid rgba(100,130,170,.18)}
.t-p{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.25)}
.tbl-wrap{overflow:auto;max-height:340px}
.tbl-wrap::-webkit-scrollbar{width:3px;height:3px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
table.t{width:100%;border-collapse:collapse;font-size:10.5px;min-width:420px}
table.t thead{position:sticky;top:0;z-index:5}
table.t th{text-align:left;padding:7px 8px;font-size:9px;font-family:var(--mono);font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;background:var(--card2);border-bottom:1px solid var(--border2);white-space:nowrap}
table.t td{padding:6px 8px;border-bottom:1px solid rgba(20,40,70,.4);vertical-align:middle;color:var(--text)}
table.t tr:hover td{background:rgba(255,255,255,.02)}
.mc{font-family:var(--mono);font-size:10px}
.nr{font-family:var(--mono);text-align:right;white-space:nowrap}
.fbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
.fbar input,.fbar select{background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r3);padding:6px 10px;font-size:10.5px;font-family:var(--font);outline:none;transition:border-color .2s}
.fbar input{width:180px}
.fbar input:focus,.fbar select:focus{border-color:var(--accent2)}
.fcnt{font-size:9.5px;font-family:var(--mono);color:var(--text2);margin-left:auto;padding:5px 9px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r3)}
.cc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:transform .15s,border-color .18s,box-shadow .18s;position:relative}
.cc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r)}
.cc.at::before,.cc.at{border-left-color:rgba(0,201,122,.3)}
.cc.at::before{background:linear-gradient(180deg,var(--green),var(--green2))}
.cc.at:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(0,201,122,.3),0 4px 16px rgba(0,201,122,.1);border-color:rgba(0,201,122,.4)}
.cc.pg::before{background:linear-gradient(180deg,var(--yellow),var(--yellow2))}
.cc.pg{border-left-color:rgba(240,180,41,.25)}
.cc.pg:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(240,180,41,.3),0 4px 16px rgba(240,180,41,.1)}
.cc.in{opacity:.65}
.cc.in:hover{opacity:.85}
.cc-nome{font-size:11.5px;font-weight:600;color:var(--white);margin-bottom:3px;line-height:1.3}
.cc-cargo{font-size:9.5px;color:var(--text2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.cc-foot{display:flex;justify-content:space-between;align-items:center}
.cc-dt{font-size:9px;font-family:var(--mono);color:var(--text3)}
.cc-val{font-size:11px;font-family:var(--mono);font-weight:700}
.cc.at .cc-val{color:var(--green)}
.cc.pg .cc-val{color:var(--yellow)}
.cc-bar{height:2px;background:rgba(20,40,70,.8);border-radius:1px;margin-top:6px;overflow:hidden}
.cc-bf{height:100%;border-radius:1px}
.cc.at .cc-bf{background:linear-gradient(90deg,var(--green2),var(--green))}
.cc.pg .cc-bf{background:linear-gradient(90deg,var(--yellow2),var(--yellow))}
.prc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:8px}
.prc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;transition:border-color .18s,transform .15s}
.prc:hover{border-color:var(--border2);transform:translateY(-1px)}
.prc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;gap:6px}
.prc-cod{font-family:var(--mono);font-size:11px;color:var(--accent2);font-weight:600}
.prc-title{font-size:10.5px;color:var(--white);margin-bottom:6px;line-height:1.35}
.prc-vals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-top:6px}
.prc-v{text-align:center;background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:4px}
.prc-vv{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--white)}
.prc-vl{font-size:8px;color:var(--text3);margin-top:1px}
.prc-bar{height:3px;background:rgba(20,40,70,.8);border-radius:2px;margin-top:6px;overflow:hidden}
.prc-bf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green2),var(--green))}
.pj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:7px}
.pjc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px;transition:border-color .18s,transform .15s}
.pjc:hover{border-color:var(--border2);transform:translateY(-1px)}
.pjc-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.pjc-id{font-family:var(--mono);font-size:10px;color:var(--accent2);font-weight:600}
.pjc-val{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--yellow)}
.pjc-obj{font-size:10.5px;color:var(--text);margin-bottom:5px;line-height:1.35;min-height:26px}
.pjc-meta{display:flex;flex-wrap:wrap;gap:3px}
.pjc-meta span{background:var(--card2);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-size:9px;font-family:var(--mono);color:var(--text2)}
.gauge-wrap{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:11px;margin-bottom:8px}
.gauge-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.gauge-lbl{font-size:9.5px;color:var(--text2);font-family:var(--mono)}
.gauge-pct{font-size:17px;font-weight:700;font-family:var(--mono)}
.gauge-bar{height:6px;background:rgba(20,40,70,.9);border-radius:3px;overflow:hidden;margin-bottom:5px}
.gauge-fill{height:100%;border-radius:3px}
.gauge-vals{display:flex;justify-content:space-between;font-size:9px;font-family:var(--mono);color:var(--text3)}
.scroll-wrap{max-height:480px;overflow-y:auto;padding-right:2px}
.scroll-wrap::-webkit-scrollbar{width:3px}
.scroll-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.overlay{position:fixed;inset:0;background:rgba(2,8,18,.72);z-index:600;display:none;align-items:flex-start;justify-content:flex-end;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.drawer{width:400px;max-width:96vw;height:100vh;overflow-y:auto;background:linear-gradient(180deg,#0a1a30,#07121e);border-left:1px solid var(--border2);transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.drawer::-webkit-scrollbar{width:3px}
.drawer::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.overlay.open .drawer{transform:translateX(0)}
.dw-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:linear-gradient(180deg,#0a1a30,rgba(10,26,48,.96));z-index:10;backdrop-filter:blur(8px)}
.dw-close{position:absolute;top:13px;right:14px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:5px;width:27px;height:27px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:15px;transition:all .15s}
.dw-close:hover{background:rgba(229,57,53,.15);border-color:rgba(229,57,53,.4);color:var(--red)}
.dw-nome{font-size:15px;font-weight:700;color:var(--white);line-height:1.3;margin:5px 0 2px;padding-right:34px}
.dw-mat{font-size:10px;font-family:var(--mono);color:var(--text2)}
.dw-cargo{font-size:10.5px;color:var(--text);margin-top:3px;font-style:italic;line-height:1.35}
.dw-body{padding:14px 18px;display:flex;flex-direction:column;gap:14px}
.dg-title{font-size:9px;font-family:var(--mono);color:var(--accent3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.dg-title::after{content:'';flex:1;height:1px;background:rgba(64,191,255,.12)}
.dr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(20,40,70,.4)}
.dr:last-child{border-bottom:none}
.drl{font-size:10.5px;color:var(--text2)}
.drv{font-size:11px;font-family:var(--mono);font-weight:600;color:var(--text);text-align:right}
.drv.hl{color:var(--white);font-size:12.5px}
.drv.gv{color:var(--green)}
.drv.yv{color:var(--yellow)}
.fin-g{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fi{background:var(--card2);border:1px solid var(--border);border-radius:var(--r2);padding:8px 10px}
.fi-l{font-size:9px;font-family:var(--mono);color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.fi-v{font-size:13px;font-weight:700;font-family:var(--mono);margin-top:2px;color:var(--white)}
.fi-v.gv{color:var(--green)}
.fi-v.yv{color:var(--yellow)}
.fi-v.av{color:var(--accent3)}
.tl-wrap{padding-left:15px;position:relative}
.tl-wrap::before{content:'';position:absolute;left:4px;top:5px;bottom:5px;width:1px;background:linear-gradient(180deg,var(--accent2),rgba(14,127,212,.1))}
.tl-i{position:relative;padding:2px 0 7px}
.tl-i::before{content:'';position:absolute;left:-12px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--card);border:2px solid var(--accent);z-index:1}
.tl-i.done::before{background:var(--green);border-color:var(--green)}
.tl-lb{font-size:9px;color:var(--text2);font-family:var(--mono)}
.tl-vl{font-size:11px;color:var(--text);font-weight:500}
.dias-b{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:600}
.d-ok{background:rgba(0,201,122,.1);color:var(--green);border:1px solid rgba(0,201,122,.2)}
.d-wn{background:rgba(240,180,41,.1);color:var(--yellow);border:1px solid rgba(240,180,41,.2)}
.d-cr{background:rgba(229,57,53,.1);color:var(--red);border:1px solid rgba(229,57,53,.2)}
.bol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px}
.bolc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px}
.bolc-nome{font-size:11px;font-weight:600;color:var(--white);margin-bottom:3px}
.bolc-meta{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.bolc-meta span{background:var(--card2);border:1px solid var(--border);padding:1px 5px;border-radius:3px;font-size:9px;font-family:var(--mono);color:var(--text2)}
.bolc-val{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--purple)}
@media(max-width:800px){.g2{grid-template-columns:1fr}}
footer{text-align:center;padding:12px;font-size:9.5px;color:var(--text3);font-family:var(--mono);border-top:1px solid var(--border);margin-top:8px}
</style>
</head>
<body>
<header class="topbar">
  <div class="tb-left">
    <div class="tb-logo">TED</div>
    <div><div class="tb-title">Painel Integrado — TEDs</div><div class="tb-sub">CGPROJ · SAES · Ministério da Saúde</div></div>
  </div>
  <div class="tb-right">
    <div class="tb-badge">688 PF ATIVOS</div>
    <span style="font-size:9.5px;color:var(--text2);font-family:var(--mono)">mar/2026</span>
  </div>
</header>
<nav class="dept-strip" id="deptStrip"></nav>
<div class="content" id="mainContent"></div>
<footer>CGPROJ · SAES · Ministério da Saúde · Painel Integrado TED v3.1 · mar/2026</footer>
<div class="overlay" id="detailOverlay" onclick="if(event.target===this)closeDetailDW()">
  <div class="drawer" id="detailDrawer">
    <div class="dw-hdr">
      <button class="dw-close" onclick="closeDetailDW()">&#10005;</button>
      <div id="detailDwSt"></div>
      <div class="dw-nome" id="detailDwNome">—</div>
      <div class="dw-mat" id="detailDwSub">—</div>
    </div>
    <div class="dw-body" id="detailDwBody"></div>
  </div>
</div>

<div class="overlay" id="projOverlay" onclick="if(event.target===this)closeProjDW()">
  <div class="drawer" id="projDrawer">
    <div class="dw-hdr">
      <button class="dw-close" onclick="closeProjDW()">&#10005;</button>
      <div id="projDwSt"></div>
      <div class="dw-nome" id="projDwNome">—</div>
      <div class="dw-mat" id="projDwSub">—</div>
    </div>
    <div class="dw-body" id="projDwBody"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeDW()">

  if(v>=1e3) return 'R$ '+(v/1e3).toFixed(0)+' K';
  return 'R$ '+v.toFixed(0);
};

function buildStrip(){
  const s = document.getElementById('deptStrip');
  s.innerHTML = ['TODOS',...DEPTS].map(d=>{
    if(d==='TODOS'){
      const vg=PROJ.filter(r=>r[3]==='VIGENTE').length;
      return '<div class="ds-btn active" onclick="sw(this,\'TODOS\')">&#127968; Todos <span class="ds-cnt">'+vg+' vigentes</span></div>';
    }
    const pf=DEPT_PF[d]||0;
    const pend=(DST[d]||{}).pd_pendente||0;
    const alrt=pend>50?' alert':'';
    return '<div class="ds-btn'+alrt+'" onclick="sw(this,\''+d+'\')">'+d+' <span class="ds-cnt">'+pf+'</span></div>';
  }).join('');
}

function sw(el,dept){
  document.querySelectorAll('.ds-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentDept=dept;
  destroyCharts();
  document.getElementById('mainContent').innerHTML='';
  renderContent(dept);
}

function renderContent(dept){
  const el=document.getElementById('mainContent');
  if(dept==='TODOS') renderGlobal(el);
  else renderDept(el,dept);
}

    const vals=lbs.map(k=>+(pp[k].val/1e3).toFixed(1));

// ---- PROJECT DRAWER ----
function openProjDW(projId){
  const r=PROJ.find(p=>p[0]===projId); if(!r) return;
  const sc=r[3]==='VIGENTE'?'t-g':r[3]==='ENCERRADO'?'t-m':'t-y';
  const pctEmp=r[6]>0?(r[7]/r[6]*100):0;
  const pctPago=r[6]>0?(r[8]/r[6]*100):0;
  const pctExec=r[7]>0?(r[8]/r[7]*100):0;
  const cltProj=CLT.filter(c=>c[2]===projId);
  const cltAtivos=cltProj.filter(c=>c[6]==='Ativo');
  const bolProj=BOL.filter(b=>b[1]===projId);
  const pjProj=PJ_D.filter(p=>p[2]===projId);
  const pdProj=[];
  DEPTS.forEach(d=>{ const tops=PD_TOP[d]||[]; tops.forEach(p=>{ if(p.projeto===projId) pdProj.push(p); }); });
  const folhaTotal=cltAtivos.reduce((s,c)=>s+(c[10]||0),0);

  document.getElementById('projDwSt').innerHTML='<span class="b-tag '+sc+'">'+r[3]+'</span>'+(r[4]?' <span class="b-tag t-b">'+r[4]+'</span>':'');
  document.getElementById('projDwNome').textContent=r[0];
  document.getElementById('projDwSub').textContent=(r[5]||'—')+' · '+(r[2]||'—');

  let html='';

  // Identificação
  html+='<div><div class="dg-title">&#128203; Identificação</div>'+
    dr2('Número/ID','<span class="drv hl">'+r[0]+'</span>')+
    dr2('Objeto',(r[1]||'—'))+
    dr2('Nome Curto',(r[9]||'—'))+
    dr2('Secretaria','<span class="b-tag t-a">'+r[2]+'</span>')+
    dr2('Tipo',r[4]||'—')+
    dr2('Parceiro/Convenente','<strong>'+r[5]+'</strong>')+
    dr2('Status','<span class="b-tag '+sc+'">'+r[3]+'</span>')+
  '</div>';

  // Valores financeiros
  const cEmp=pc(pctEmp), cPago=pc(pctPago);
  html+='<div><div class="dg-title">&#128176; Execução Financeira</div>'+
    '<div class="fin-g">'+
      fi2('Aprovado','av',BRL(r[6]))+
      fi2('Empenhado','yv',BRL(r[7]))+
      fi2('Pago','gv',BRL(r[8]))+
      fi2('Folha Mensal','',BRL(folhaTotal))+
    '</div>'+
    '<div style="margin-top:10px">'+
      '<div class="gauge-wrap"><div class="gauge-top"><span class="gauge-lbl">% Empenhado</span><span class="gauge-pct" style="color:'+cEmp+'">'+pctEmp.toFixed(1)+'%</span></div><div class="gauge-bar"><div class="gauge-fill" style="width:'+Math.min(pctEmp,100)+'%;background:'+cEmp+'"></div></div><div class="gauge-vals"><span>Emp: '+BRLk(r[7])+'</span><span>Aprov: '+BRLk(r[6])+'</span></div></div>'+
      '<div class="gauge-wrap" style="margin-top:6px"><div class="gauge-top"><span class="gauge-lbl">% Pago / Aprovado</span><span class="gauge-pct" style="color:'+cPago+'">'+pctPago.toFixed(1)+'%</span></div><div class="gauge-bar"><div class="gauge-fill" style="width:'+Math.min(pctPago,100)+'%;background:'+cPago+'"></div></div><div class="gauge-vals"><span>Pago: '+BRLk(r[8])+'</span><span>Aprov: '+BRLk(r[6])+'</span></div></div>'+
    (pctExec>0?'<div class="gauge-wrap" style="margin-top:6px"><div class="gauge-top"><span class="gauge-lbl">% Pago / Empenhado</span><span class="gauge-pct" style="color:'+pc(pctExec)+'">'+pctExec.toFixed(1)+'%</span></div><div class="gauge-bar"><div class="gauge-fill" style="width:'+Math.min(pctExec,100)+'%;background:'+pc(pctExec)+'"></div></div><div class="gauge-vals"><span>Pago: '+BRLk(r[8])+'</span><span>Emp: '+BRLk(r[7])+'</span></div></div>':'')+
    '</div></div>';

  // Cronograma de desembolso (derivado dos CLTs do projeto)
  if(cltProj.length>0){
    const admDates=cltProj.filter(c=>c[13]).map(c=>c[13]).sort();
    const fimDates=cltProj.filter(c=>c[15]).map(c=>c[15]).sort();
    const inicio=admDates.length>0?fd(admDates[0]):'—';
    const fim=fimDates.length>0?fd(fimDates[fimDates.length-1]):'—';
    const today='2026-03-06';
    const ultimaData=fimDates.length>0?fimDates[fimDates.length-1]:null;
    let diasRest='—', dbc='d-ok';
    if(ultimaData){
      const dr=Math.round((new Date(ultimaData)-new Date(today))/(86400000));
      diasRest=dr>0?'+'+dr+' dias':dr===0?'hoje':Math.abs(dr)+' dias vencido';
      dbc=dr<90?'d-cr':dr<180?'d-wn':'d-ok';
    }
    html+='<div><div class="dg-title">&#128197; Vigência e Cronograma</div>'+
      dr2('Início (1ª admissão)',inicio)+
      dr2('Término (último contrato)',fim)+
      '<div class="dr"><span class="drl">Prazo restante</span><span class="dias-b '+dbc+'">'+diasRest+'</span></div>'+
    '</div>';
  }

  // Equipe CLT
  html+='<div><div class="dg-title">&#128101; Equipe</div>'+
    '<div class="fin-g">'+
      fi2('CLT Ativos','av',cltAtivos.length)+
      fi2('CLT Total','',cltProj.length)+
      fi2('Bolsistas','',bolProj.length)+
      fi2('Contratos PJ','',pjProj.length)+
    '</div>';
  if(cltAtivos.length>0){
    html+='<div style="margin-top:10px;max-height:200px;overflow-y:auto" class="scroll-wrap"><table class="t"><thead><tr><th>Nome</th><th>Depto</th><th>Custo Efetivo</th></tr></thead><tbody>';
    cltAtivos.sort((a,b)=>(b[10]||0)-(a[10]||0)).slice(0,20).forEach(c=>{
      html+='<tr><td>'+c[0]+'</td><td>'+c[4]+'</td><td class="nr">'+BRLk(c[10])+'</td></tr>';
    });
    if(cltAtivos.length>20) html+='<tr><td colspan="3" style="color:var(--text3);font-style:italic">… e mais '+(cltAtivos.length-20)+' colaboradores</td></tr>';
    html+='</tbody></table></div>';
  }
  html+='</div>';

  // Passagens e Diárias
  if(pdProj.length>0){
    const pdTotal=pdProj.reduce((s,p)=>s+p.total,0);
    html+='<div><div class="dg-title">&#9992; Passagens e Diárias</div>'+
      dr2('Total de PDs',pdProj.length)+
      dr2('Valor Total','<span class="drv hl">'+BRL(pdTotal)+'</span>')+
      '<div style="margin-top:8px;max-height:160px;overflow-y:auto" class="scroll-wrap"><table class="t"><thead><tr><th>ID</th><th>Nome</th><th>Valor</th></tr></thead><tbody>';
    pdProj.sort((a,b)=>b.total-a.total).slice(0,10).forEach(p=>{
      html+='<tr><td class="mc">'+p.id+'</td><td>'+p.nome+'</td><td class="nr">'+BRLk(p.total)+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }

  // Contratos PJ
  if(pjProj.length>0){
    const pjTotal=pjProj.reduce((s,p)=>s+(p[7]||0),0);
    html+='<div><div class="dg-title">&#128188; Contratos PJ</div>'+
      dr2('Total de Contratos',pjProj.length)+
      dr2('Valor Total','<span class="drv hl">'+BRL(pjTotal)+'</span>')+
      '<div style="margin-top:8px;max-height:160px;overflow-y:auto" class="scroll-wrap"><table class="t"><thead><tr><th>ID</th><th>Tipo</th><th>Valor</th></tr></thead><tbody>';
    pjProj.sort((a,b)=>(b[7]||0)-(a[7]||0)).slice(0,10).forEach(p=>{
      html+='<tr><td class="mc">'+p[0]+'</td><td>'+p[1]+'</td><td class="nr">'+BRLk(p[7])+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }

  document.getElementById('projDwBody').innerHTML=html;
  document.getElementById('projOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

      dr2('ID Contrato','<span class="drv hl">'+r[0]+'</span>')+
      dr2('Categoria',r[1]||'—')+
      dr2('Projeto','<span class="b-tag t-b">'+r[2]+'</span>')+
      dr2('Departamento',r[3]||'—')+
    '</div>'+
    '<div><div class="dg-title">&#128196; Detalhes</div>'+
      '<div style="font-size:11px;color:var(--text);line-height:1.5;padding:8px 10px;background:var(--card2);border:1px solid var(--border);border-radius:var(--r2)">'+
        '<div style="font-size:9px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;margin-bottom:4px">Objeto/Descrição</div>'+
        (r[4]||'—')+
      '</div>'+
      dr2('Fornecedor','<strong>'+(r[5]||'—')+'</strong>')+
      dr2('Observação',r[6]||'—')+
    '</div>'+
    '<div><div class="dg-title">&#128176; Valor</div>'+
      '<div class="fin-g">'+
        fi2('Valor Total','av',BRL(r[7]))+
      '</div>'+

  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ---- PD DRAWER ----
function openPdDW(r){
  if(!r) return;
  document.getElementById('detailDwSt').innerHTML='<span class="b-tag t-r">Passagem/Diária</span> <span class="b-tag '+(r.tipo==='Extraordinária'?'t-p':'t-b')+'">'+r.tipo+'</span>';
  document.getElementById('detailDwNome').textContent=r.id;
  document.getElementById('detailDwSub').textContent=(r.nome||'—');
  document.getElementById('detailDwBody').innerHTML=
    '<div><div class="dg-title">&#128203; Identificação</div>'+
      dr2('ID','<span class="drv hl">'+r.id+'</span>')+
      dr2('Nome',r.nome||'—')+
      dr2('Tipo','<span class="b-tag '+(r.tipo==='Extraordinária'?'t-p':'t-b')+'">'+r.tipo+'</span>')+
      dr2('Situação',r.situacao||'—')+
      dr2('Projeto','<span class="b-tag t-b">'+(r.projeto||'—')+'</span>')+
    '</div>'+
    '<div><div class="dg-title">&#9992; Trajeto</div>'+
      dr2('Origem','<strong>'+(r.origem||'—')+'</strong>')+
      dr2('Destino','<strong>'+(r.destino||'—')+'</strong>')+
    '</div>'+
    '<div><div class="dg-title">&#128176; Valores</div>'+
      '<div class="fin-g">'+
        fi2('Diárias','yv',BRL(r.diarias))+
        fi2('Passagem','av',BRL(r.passagem))+
      '</div>'+
      '<div class="dr" style="margin-top:7px"><span class="drl">Valor Total</span><span class="drv hl" style="color:var(--red)">'+BRL(r.total)+'</span></div>'+
    '</div>'+
    buildPdHistory(r);
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeDetailDW(){ document.getElementById('detailOverlay').classList.remove('open'); document.body.style.overflow=''; }

// ---- HISTÓRICO POR PESSOA ----
function buildCltHistory(current){
  const nome=current[0];
  const others=CLT.filter(c=>c[0]===nome && c!==current).sort((a,b)=>(b[13]||'').localeCompare(a[13]||''));
  if(others.length===0) return '';
  const totalExec=CLT.filter(c=>c[0]===nome).reduce((s,c)=>s+(c[12]||0),0);
  const totalEst=CLT.filter(c=>c[0]===nome).reduce((s,c)=>s+(c[11]||0),0);
  let h='<div><div class="dg-title">&#128218; Histórico de Registros ('+nome+')</div>'+
    '<div class="fin-g" style="margin-bottom:10px">'+
      fi2('Total Registros','av',(others.length+1))+
      fi2('Val. Agregado Exec.','gv',BRL(totalExec))+
    '</div>'+
    (totalEst>0?'<div class="dr" style="margin-bottom:8px"><span class="drl">Val. Agregado Estimado</span><span class="drv hl">'+BRL(totalEst)+'</span></div>':'')+
    '<div class="tbl-wrap" style="max-height:220px"><table class="t"><thead><tr><th>Projeto</th><th>Cargo</th><th>Status</th><th>Admissão</th><th>Término</th><th style="text-align:right">Custo Exec.</th></tr></thead><tbody>';
  others.forEach(c=>{
    const cargo=(c[7]||'').replace(/-TED-\d{2,3}-\d{4}/g,'').trim();
    h+='<tr><td class="mc">'+c[2]+'</td><td style="font-size:9.5px">'+cargo+'</td><td>'+sBadge(c[6])+'</td><td class="mc">'+fd(c[13])+'</td><td class="mc">'+fd(c[15])+'</td><td class="nr" style="font-weight:600;color:var(--green)">'+BRLk(c[12])+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function buildBolHistory(current){
  const nome=current[0];
  const others=BOL.filter(b=>b[0]===nome && b!==current).sort((a,b)=>(b[7]||'').localeCompare(a[7]||''));
  if(others.length===0) return '';
  const totalExec=BOL.filter(b=>b[0]===nome).reduce((s,b)=>s+(b[6]||0),0);
  let h='<div><div class="dg-title">&#128218; Histórico de Registros ('+nome+')</div>'+
    '<div class="fin-g" style="margin-bottom:10px">'+
      fi2('Total Registros','av',(others.length+1))+
      fi2('Val. Agregado Exec.','gv',BRL(totalExec))+
    '</div>'+
    '<div class="tbl-wrap" style="max-height:220px"><table class="t"><thead><tr><th>Projeto</th><th>Vínculo</th><th>Coordenação</th><th>Término</th><th style="text-align:right">Val. Executado</th></tr></thead><tbody>';
  others.forEach(b=>{
    h+='<tr><td class="mc">'+b[1]+'</td><td>'+b[4]+'</td><td>'+(b[3]||'—')+'</td><td class="mc">'+fd(b[7])+'</td><td class="nr" style="font-weight:600;color:var(--purple)">'+BRLk(b[6])+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function buildPjHistory(current){
  const fornecedor=(current[5]||'').trim();
  if(!fornecedor) return '';
  const others=PJ_D.filter(p=>(p[5]||'').trim()===fornecedor && p!==current).sort((a,b)=>(b[7]||0)-(a[7]||0));
  if(others.length===0) return '';
  const totalVal=PJ_D.filter(p=>(p[5]||'').trim()===fornecedor).reduce((s,p)=>s+(p[7]||0),0);
  let h='<div><div class="dg-title">&#128218; Histórico de Registros ('+fornecedor.substring(0,40)+')</div>'+
    '<div class="fin-g" style="margin-bottom:10px">'+
      fi2('Total Contratos','av',(others.length+1))+
      fi2('Val. Agregado','gv',BRL(totalVal))+
    '</div>'+
    '<div class="tbl-wrap" style="max-height:220px"><table class="t"><thead><tr><th>ID</th><th>Categoria</th><th>Projeto</th><th>Objeto</th><th style="text-align:right">Valor</th></tr></thead><tbody>';
  others.forEach(p=>{
    h+='<tr><td class="mc">'+p[0]+'</td><td>'+p[1]+'</td><td class="mc">'+p[2]+'</td><td style="font-size:9.5px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(p[4]||'—')+'</td><td class="nr" style="font-weight:600;color:var(--yellow)">'+BRLk(p[7])+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function buildPdHistory(current){
  const nome=(current.nome||'').trim();
  if(!nome) return '';
  const allPds=[];
  DEPTS.forEach(d=>{ (PD_TOP[d]||[]).forEach(p=>{ if((p.nome||'').trim()===nome) allPds.push(p); }); });
  const others=allPds.filter(p=>p.id!==current.id).sort((a,b)=>(b.total||0)-(a.total||0));
  if(others.length===0) return '';
  const totalVal=allPds.reduce((s,p)=>s+(p.total||0),0);
  const totalDiarias=allPds.reduce((s,p)=>s+(p.diarias||0),0);
  const totalPassagem=allPds.reduce((s,p)=>s+(p.passagem||0),0);
  let h='<div><div class="dg-title">&#128218; Histórico de Registros ('+nome+')</div>'+
    '<div class="fin-g" style="margin-bottom:10px">'+
      fi2('Total Registros','av',allPds.length)+
      fi2('Val. Agregado','gv',BRL(totalVal))+
      fi2('Diárias Agregadas','yv',BRL(totalDiarias))+
      fi2('Passagens Agregadas','av',BRL(totalPassagem))+
    '</div>'+
    '<div class="tbl-wrap" style="max-height:220px"><table class="t"><thead><tr><th>ID</th><th>Tipo</th><th>Projeto</th><th>Destino</th><th style="text-align:right">Diárias</th><th style="text-align:right">Passagem</th><th style="text-align:right">Total</th></tr></thead><tbody>';
  others.forEach(p=>{
    h+='<tr><td class="mc">'+p.id+'</td><td><span class="b-tag '+(p.tipo==='Extraordinária'?'t-p':'t-b')+'">'+p.tipo+'</span></td><td class="mc">'+(p.projeto||'—')+'</td><td class="mc">'+(p.destino||'—')+'</td><td class="nr">'+BRL(p.diarias)+'</td><td class="nr">'+BRL(p.passagem)+'</td><td class="nr" style="font-weight:700;color:var(--red)">'+BRL(p.total)+'</td></tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeDW(); closeProjDW(); closeDetailDW(); } });
