const EDITAIS=['2023','2024.1','2024.2','2025'];
const STATUS_COLORS={'Aprovado para Captação':'#14b8a6','Aprovado (Não Contemplado)':'#f59e0b','Reprovado':'#ef4444','Captação Insuficiente':'#8b5cf6'};
const EQUIP_COLORS={'Acelerador Linear':'#ef4444','PET-CT':'#8b5cf6','Tomógrafo':'#14b8a6','Ressonância':'#f59e0b','Mamógrafo':'#ec4899','Braquiterapia':'#06b6d4','Videolap./Endoscopia':'#84cc16','Cintilografia':'#f97316','Radioscopia':'#6366f1','Biopsia Cabeça':'#e11d48','Biopsia Pescoço':'#be123c','Diagnóstico/Outros':'#64748b','Não classificado':'#475569'};

const fmt=v=>{if(!v&&v!==0)return'R$ 0';if(Math.abs(v)>=1e9)return`R$ ${(v/1e9).toFixed(2)} bi`;if(Math.abs(v)>=1e6)return`R$ ${(v/1e6).toFixed(1)} mi`;if(Math.abs(v)>=1e3)return`R$ ${(v/1e3).toFixed(0)} mil`;return`R$ ${v.toFixed(0)}`;};
const pct=(a,b)=>b?`${((a/b)*100).toFixed(1)}%`:'0%';

const colorScale=(val,max)=>{
  if(!val||!max)return"rgba(255,255,255,0.03)";
  const t=Math.pow(val/max,0.5);
  if(t<.33)return`rgb(${Math.round(8+t*3*40)},${Math.round(20+t*3*120)},${Math.round(60+t*3*140)})`;
  if(t<.66){const s=(t-.33)/.33;return`rgb(${Math.round(48+s*20)},${Math.round(140+s*60)},${Math.round(200-s*80)})`;}
  const s=(t-.66)/.34;return`rgb(${Math.round(68+s*180)},${Math.round(200+s*40)},${Math.round(120-s*60)})`;
};

/* ═══ SHARED COMPONENTS ═══ */
const KPI=({label,value,color='#5cb8ff',delay=0})=>(
  <div className="card kpi fade-in" style={{animationDelay:`${delay}s`}}>
    <div className="bar" style={{background:color}}/>
    <div className="val">{value}</div>
    <div className="lbl">{label}</div>
  </div>
);

const EditalFilter=({selected,onChange,showAll=true})=>(
  <div style={{display:'flex',flexWrap:'wrap',gap:2,marginBottom:16}}>
    {showAll&&<span className={`pill ${selected==='all'?'on':''}`} onClick={()=>onChange('all')}>Todos</span>}
    {EDITAIS.map(e=><span key={e} className={`pill ${selected===e?'on':''}`} onClick={()=>onChange(e)}>{e}</span>)}
  </div>
);

const TooltipCustom=({active,payload,label,valuePrefix=''})=>{
  if(!active||!payload?.length)return null;
  return(<div style={{background:'#131e2e',border:'1px solid rgba(92,184,255,.3)',borderRadius:12,padding:'10px 14px',fontSize:12}}>
    <div style={{color:'#5cb8ff',fontWeight:700,marginBottom:4}}>{label}</div>
    {payload.map((p,i)=><div key={i} style={{color:p.color||'#e8ecf1'}}>{p.name}: <span className="mono" style={{fontWeight:600}}>{valuePrefix}{typeof p.value==='number'&&p.value>9999?fmt(p.value):p.value}</span></div>)}
  </div>);
};

/* ═══ TAB 2: EQUIPAMENTOS ═══ */
function TabEquip(){
  const [ed,setEd]=useState('all');
  const eqData=useMemo(()=>{
    const merged={};
    const eds=ed==='all'?EDITAIS:[ed];
    eds.forEach(e=>{
      const d=DATA.equipByEdital[e]||{};
      Object.entries(d).forEach(([k,v])=>{merged[k]=(merged[k]||0)+v;});
    });
    return Object.entries(merged).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({name:k,value:v,fill:EQUIP_COLORS[k]||'#64748b'}));
  },[ed]);

  // By edital stacked
  const allCats=[...new Set(EDITAIS.flatMap(e=>Object.keys(DATA.equipByEdital[e]||{})))];
  const stackData=EDITAIS.map(e=>{
    const row={ed:e};
    allCats.forEach(c=>{row[c]=(DATA.equipByEdital[e]||{})[c]||0;});
    return row;
  });

  return(<div className="fade-in">
    <EditalFilter selected={ed} onChange={setEd}/>
    <div style={{fontSize:11,color:'#6b7b8d',marginBottom:12}}>Categorização por título do projeto · Inclui ciclo 2025 (parsing automático)</div>
    <div className="resp-flex" style={{display:'flex',gap:16}}>
      <div className="card" style={{flex:'1 1 400px'}}>
        <div style={{fontSize:15,fontWeight:700,color:'#e8ecf1',marginBottom:12}}>Tipos de Equipamento{ed!=='all'?` — ${ed}`:''}</div>
        <ResponsiveContainer width="100%" height={350}>
          <BarChart data={eqData} layout="vertical">
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,.05)"/>
            <XAxis type="number" stroke="#556677" fontSize={11}/>
            <YAxis type="category" dataKey="name" width={160} stroke="#556677" fontSize={11}/>
            <Tooltip content={<TooltipCustom/>}/>
            <Bar dataKey="value" name="Projetos" radius={[0,4,4,0]}>
              {eqData.map(e=><Cell key={e.name} fill={e.fill}/>)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div className="card" style={{flex:'1 1 400px'}}>
        <div style={{fontSize:15,fontWeight:700,color:'#e8ecf1',marginBottom:12}}>Equipamentos por Edital</div>
        <ResponsiveContainer width="100%" height={350}>
          <BarChart data={stackData}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,.05)"/>
            <XAxis dataKey="ed" stroke="#556677" fontSize={12}/>
            <YAxis stroke="#556677" fontSize={11}/>
            <Tooltip content={<TooltipCustom/>}/>
            <Legend wrapperStyle={{fontSize:10}}/>
            {allCats.filter(c=>c!=='Diagnóstico/Outros'&&c!=='Não classificado').slice(0,8).map(c=>
              <Bar key={c} dataKey={c} stackId="a" fill={EQUIP_COLORS[c]||'#64748b'}/>
            )}
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div className="card" style={{marginTop:16}}>
        <div style={{fontSize:15,fontWeight:700,color:'#e8ecf1',marginBottom:14}}>Valor Médio por Equipamento <span style={{fontSize:11,color:'#556677',fontWeight:400}}>— Val. Aprovado ÷ Qtd. Equipamentos (todos os editais)</span></div>
        {(()=>{
          const totals={};
          Object.values(DATA.equipValsByEdital).forEach(arr=>arr.forEach(({cat,n,valAprov})=>{
            if(!totals[cat])totals[cat]={n:0,v:0};
            totals[cat].n+=n; totals[cat].v+=valAprov;
          }));
          const rows=Object.entries(totals)
            .filter(([,d])=>d.n>0&&d.v>0)
            .map(([cat,d])=>({cat,avg:d.v/d.n,n:d.n,total:d.v}))
            .sort((a,b)=>b.avg-a.avg);
          const maxAvg=rows[0]?.avg||1;
          return(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'6px 24px'}}>
              {rows.map((r,i)=>(
                <div key={r.cat} style={{marginBottom:4}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:3}}>
                    <div style={{display:'flex',alignItems:'center',gap:7}}>
                      <div style={{width:10,height:10,borderRadius:3,background:EQUIP_COLORS[r.cat]||'#64748b',flexShrink:0}}/>
                      <span style={{fontSize:12,fontWeight:600,color:'#c8d4e0'}}>{r.cat}</span>
                    </div>
                    <div style={{display:'flex',gap:14,alignItems:'baseline'}}>
                      <span style={{fontSize:10,color:'#6b7b8d'}}>{r.n} proj.</span>
                      <span className="mono" style={{fontSize:13,fontWeight:700,color:i<3?'#5cb8ff':'#e8ecf1'}}>{fmt(r.avg)}</span>
                    </div>
                  </div>
                  <div style={{height:5,borderRadius:3,background:'rgba(255,255,255,.05)',overflow:'hidden'}}>
                    <div style={{width:`${(r.avg/maxAvg)*100}%`,height:'100%',borderRadius:3,background:EQUIP_COLORS[r.cat]||'#64748b',opacity:.8,transition:'width .6s'}}/>
                  </div>
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    </div>
  </div>);
}

  const [ed,setEd]=useState('all');

        if(!merged[r.cat])merged[r.cat]={cat:r.cat,n:0,valAprov:0,valApres:0};

        merged[r.cat].valAprov+=r.valAprov;
        merged[r.cat].valApres+=r.valApres;
      });

    return Object.values(merged).sort((a,b)=>b.valAprov-a.valAprov).map(r=>({...r,media:r.n?r.valAprov/r.n:0}));

          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,.05)"/>

          <YAxis type="category" dataKey="cat" width={170} stroke="#556677" fontSize={11}/>

/* ═══ TAB 6: GEOGRAFIA ═══ */
function TabGeo(){
  const [metric,setMetric]=useState('t');
  const [hover,setHover]=useState(null);
  const [eqFilter,setEqFilter]=useState('all');
  const [ciclo,setCiclo]=useState('all');
  const [showPins,setShowPins]=useState(true);
  const [selectedUF,setSelectedUF]=useState(null);
  const svgRef=useRef(null);
  const METRICS=[{k:'t',l:'Total Projetos'},{k:'eN',l:'Proj. Equipamento'},{k:'c',l:'Contemplados'},{k:'vP',l:'Val. Aprovado'},{k:'eV',l:'Val. Equip.'}];

  // Calcula fatores de escala por ciclo para cada métrica
  const UD=useMemo(()=>{
    if(ciclo==='all')return DATA.ufData;
    const ed=DATA.byEdital[ciclo]||{};
    const ov=DATA.overview;
    // Equipamentos por ciclo
    const eqTot=Object.values(DATA.equipByEdital[ciclo]||{}).reduce((s,v)=>s+v,0);
    const eqTotAll=Object.values(DATA.equipByEdital).flatMap(Object.values).reduce((s,v)=>s+v,0);
    const eqValTot=(DATA.equipValsByEdital[ciclo]||[]).reduce((s,r)=>s+r.valAprov,0);
    const eqValAll=Object.values(DATA.equipValsByEdital).flatMap(a=>a).reduce((s,r)=>s+r.valAprov,0);
    const factors={
      t: (ed.total||0)/(ov.total||1),
      c: (ed.aprovCapt||0)/Math.max(1,ov.aprovCapt||186),
      vP: (ed.valApresentado||0)/Math.max(1,ov.valApresentado),
        vApC: (ed.valAprovCapt||0)/Math.max(1,ov.valAprovCapt||1),
      vC: (ed.valCaptado||0)/Math.max(1,ov.valCaptado),
      eN: eqTotAll>0?eqTot/eqTotAll:0,
      eV: eqValAll>0?eqValTot/eqValAll:0,
    };
    // Aplica fator uniformemente por UF (escala relativa preservada)
    const scaled={};
    Object.entries(DATA.ufData).forEach(([uf,d])=>{
      scaled[uf]={...d};
      ['t','c','eN'].forEach(k=>{scaled[uf][k]=Math.round(d[k]*(factors[k]||0));});
      ['vP','vApC','vC','eV'].forEach(k=>{scaled[uf][k]=(d[k]||0)*(factors[k]||0);});
    });
    return scaled;
  },[ciclo]);

  const maxVal=useMemo(()=>Math.max(...Object.values(UD).map(d=>d[metric]||0),1),[UD,metric]);
  const STRAT_EQUIP=['all','Acelerador Linear','Tomógrafo','Ressonância','PET-CT','Biopsia Cabeça','Biopsia Pescoço'];
  const visiblePins=useMemo(()=>{
    if(eqFilter==='all')return DATA.pins.filter(p=>p.equip>0);
    return(DATA.stratPins[eqFilter]||[]);
  },[eqFilter]);
  const munRanking=useMemo(()=>{
    if(!selectedUF)return null;
    return DATA.pins
      .filter(p=>p.uf===selectedUF&&p.equip>0)
      .sort((a,b)=>b.equip-a.equip||b.valAprov-a.valAprov);
  },[selectedUF]);
  const hoverInfo=useMemo(()=>{
    if(!hover)return null;
    if(typeof hover==='string'&&hover.startsWith('pin_')){
      const idx=parseInt(hover.split('_')[1]);
      const p=visiblePins[idx]||null;
      return p?{type:'pin',data:p}:null;
    }
    if(UD[hover])return{type:'uf',uf:hover,data:UD[hover]};
    return null;
  },[hover,visiblePins,UD]);

  return(<div className="fade-in">
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
      {METRICS.map(m=><span key={m.k} className={`pill ${metric===m.k?'on':''}`} onClick={()=>setMetric(m.k)}>{m.l}</span>)}
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8,alignItems:'center'}}>
      <span style={{fontSize:11,color:'#6b7b8d',fontWeight:600,marginRight:4}}>Ciclo:</span>
      {(['all',...EDITAIS]).map(e=>(
        <span key={e} className={`pill ${ciclo===e?'on':''}`} onClick={()=>{setCiclo(e);setSelectedUF(null);}} style={{fontSize:10,background:ciclo===e?'rgba(245,158,11,.18)':undefined,color:ciclo===e?'#f59e0b':undefined,borderColor:ciclo===e?'rgba(245,158,11,.4)':undefined}}>{e==='all'?'Todos':e}</span>
      ))}
      {ciclo!=='all'&&<span style={{fontSize:9,color:'#556677',marginLeft:4}}>· distribuição proporcional por UF</span>}
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8,alignItems:'center'}}>
      <span style={{fontSize:11,color:'#6b7b8d',fontWeight:600,marginRight:4}}>Equipamentos:</span>
      {STRAT_EQUIP.map(e=><span key={e} className={`pill ${eqFilter===e?'on':''}`} onClick={()=>setEqFilter(e)} style={{fontSize:10}}>{e==='all'?'Todos':e}</span>)}
      <span className={`pill ${showPins?'on':''}`} onClick={()=>setShowPins(!showPins)} style={{fontSize:10,marginLeft:8}}>📍 Pins ({visiblePins.length})</span>
    </div>

    <div className="resp-flex" style={{display:'flex',gap:16}}>
      <div style={{flex:'1 1 520px',position:'relative'}}>
        <div className="card" style={{position:'relative'}}>
          <svg ref={svgRef} viewBox="-10 -5 630 650" style={{width:'100%',height:'auto'}}>
            <defs>
              <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
              <filter id="pinShadow"><feDropShadow dx="0" dy="1" stdDeviation="2" floodColor="#000" floodOpacity=".5"/></filter>
              <symbol id="pinIcon" viewBox="0 0 1128 1600">
                <path d="M 532 222 L 497 226 L 456 235 L 433 242 L 395 257 L 356 278 L 326 298 L 295 324 L 266 354 L 241 386 L 224 412 L 207 444 L 192 481 L 181 521 L 174 564 L 173 633 L 178 672 L 186 705 L 200 744 L 214 774 L 274 881 L 360 1012 L 410 1093 L 442 1150 L 476 1218 L 516 1313 L 534 1366 L 550 1421 L 564 1483 L 581 1410 L 605 1332 L 629 1269 L 655 1211 L 693 1137 L 730 1073 L 863 866 L 885 827 L 926 744 L 941 703 L 949 668 L 953 639 L 954 591 L 953 570 L 946 523 L 938 492 L 922 450 L 901 410 L 875 372 L 857 350 L 819 313 L 787 289 L 756 270 L 723 254 L 685 240 L 647 230 L 591 222 Z M 530 337 L 598 337 L 648 347 L 676 357 L 705 371 L 745 397 L 784 433 L 804 458 L 821 484 L 833 507 L 844 534 L 852 561 L 858 593 L 859 655 L 852 701 L 844 728 L 833 755 L 820 780 L 799 811 L 785 828 L 760 853 L 715 886 L 679 904 L 658 912 L 629 920 L 594 926 L 539 926 L 508 922 L 483 916 L 449 904 L 417 888 L 395 874 L 373 857 L 347 832 L 330 812 L 315 791 L 299 763 L 285 730 L 277 704 L 269 656 L 270 597 L 273 576 L 283 538 L 293 512 L 304 490 L 319 465 L 335 444 L 351 426 L 377 402 L 397 387 L 423 371 L 452 357 L 474 349 L 505 341 Z" fillRule="evenodd"/>
                <path d="M 471 730 L 476 805 L 482 861 L 631 860 L 625 822 L 618 732 L 512 729 Z"/>
                <path d="M 621 717 L 618 719 L 627 731 L 635 814 L 635 719 L 630 717 Z"/>
                <path d="M 331 560 L 331 710 L 401 717 L 474 721 L 613 723 L 612 720 L 467 572 L 385 567 Z"/>
                <path d="M 380 557 L 473 565 L 612 706 L 788 706 L 790 704 L 789 557 Z"/>
                <path d="M 489 400 L 488 546 L 634 547 L 636 545 L 636 402 Z"/>
              </symbol>
            </defs>
            {Object.entries(B).map(([uf,{d,x,y}])=>{
              const val=(UD[uf]&&UD[uf][metric])||0;
              const fill=colorScale(val,maxVal);
              const isH=hover===uf;
              const isSel=selectedUF===uf;
              return(<g key={uf} onMouseEnter={()=>setHover(uf)} onMouseLeave={()=>setHover(null)} onClick={()=>setSelectedUF(isSel?null:uf)} style={{cursor:'pointer'}}>
                <path d={d} fill={isSel?'#f59e0b':(isH?'#5cb8ff':fill)} stroke={isSel?'#fff':(isH?'#fff':'rgba(255,255,255,.15)')} strokeWidth={isSel?2:(isH?2:.8)} style={{transition:'fill .2s'}} filter={(isSel||isH)?'url(#glow)':'none'}/>

              </g>);
            })}
            {showPins&&visiblePins.map((p,i)=>{
              const sz=Math.max(9,Math.min(16,Math.sqrt((p.equip||p.n||1))*4));
              const pinColor=eqFilter!=='all'?(EQUIP_COLORS[eqFilter]||'#f59e0b'):'#f59e0b';
              const isHP=hover===('pin_'+i);
              return(
                <g key={i} style={{cursor:'pointer'}} onMouseEnter={()=>setHover('pin_'+i)} onMouseLeave={()=>setHover(null)} filter="url(#pinShadow)">

            <div style={{fontSize:9,color:'#556677',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{METRICS.find(m=>m.k===metric)?.l}</div>

              <span style={{fontSize:9,color:'#556677'}}>0</span>

              <span style={{fontSize:9,color:'#556677'}}>{metric.startsWith('v')?fmt(maxVal):maxVal}</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{flex:'1 1 320px',display:'flex',flexDirection:'column',gap:12}}>
        {/* ── CARD FIXO DE INFORMAÇÕES ── */}
        {(()=>{
          // Agrega dados a partir de UD (já filtrado por ciclo)
          const ufsScope = selectedUF ? [selectedUF] : Object.keys(UD);
          const totalProj = ufsScope.reduce((s,uf)=>s+(UD[uf]?.t||0),0);

          const totalVal = ufsScope.reduce((s,uf)=>s+(UD[uf]?.vApC||0),0);
          const totalCaptado = ufsScope.reduce((s,uf)=>s+(UD[uf]?.vC||0),0);
          const totalMun = selectedUF
            ? new Set(DATA.pins.filter(p=>p.uf===selectedUF&&p.equip>0).map(p=>p.mun)).size

          // Breakdown de tipos: usa tE de cada UF (array [[tipo,n]])
          const eqBreakdown = {};
          const cicloFactor = ciclo!=='all'
            ? (()=>{
                const eqTot=Object.values(DATA.equipByEdital[ciclo]||{}).reduce((s,v)=>s+v,0);
                const eqTotAll=Object.values(DATA.equipByEdital).flatMap(Object.values).reduce((s,v)=>s+v,0);
                return eqTotAll>0?eqTot/eqTotAll:0;
              })()
            : 1;
          ufsScope.forEach(uf=>{
            (DATA.ufData[uf]?.tE||[]).forEach(([k,v])=>{
              eqBreakdown[k]=(eqBreakdown[k]||0)+Math.round(v*cicloFactor);
            });
          });
          // Se filtro de equip ativo, mostrar só esse tipo
          const eqEntries = eqFilter!=='all'
            ? (eqBreakdown[eqFilter]?[[eqFilter,eqBreakdown[eqFilter]]]:[])
            : Object.entries(eqBreakdown).sort((a,b)=>b[1]-a[1]);
          const cicloLabel = ciclo!=='all' ? ` · ${ciclo}` : '';
          const scopeLabel = selectedUF ? (selectedUF+cicloLabel) : (eqFilter!=='all' ? (eqFilter+cicloLabel) : ('Brasil'+cicloLabel));
          const borderColor = hoverInfo
            ? (hoverInfo.type==='pin' ? 'rgba(245,158,11,.45)' : 'rgba(92,184,255,.35)')
            : (selectedUF ? 'rgba(245,158,11,.3)' : 'rgba(92,184,255,.15)');
          const titleColor = hoverInfo
            ? (hoverInfo.type==='pin' ? '#f59e0b' : '#5cb8ff')
            : (selectedUF ? '#f59e0b' : '#5cb8ff');
          return(
            <div className="card" style={{minHeight:180,transition:'all .25s',border:`1px solid ${borderColor}`}}>
              {hoverInfo&&hoverInfo.type==='uf'&&(
                <div>
                  <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:10}}>
                    <div style={{fontSize:26,fontWeight:800,color:'#5cb8ff',fontFamily:"'JetBrains Mono'"}}>{hoverInfo.uf}</div>
                    <div style={{fontSize:11,color:'#6b7b8d'}}>{METRICS.find(m=>m.k===metric)?.l}</div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'6px 12px',fontSize:12}}>
                    <span style={{color:'#6b7b8d'}}>Total projetos</span><span className="mono" style={{fontWeight:700,color:'#e8ecf1',textAlign:'right'}}>{hoverInfo.data.t}</span>
                    <span style={{color:'#6b7b8d'}}>Contemplados</span><span className="mono" style={{fontWeight:700,color:'#14b8a6',textAlign:'right'}}>{hoverInfo.data.c}</span>
                    <span style={{color:'#6b7b8d'}}>Proj. Equipamento</span><span className="mono" style={{fontWeight:700,color:'#f59e0b',textAlign:'right'}}>{hoverInfo.data.eN}</span>
                    <span style={{color:'#6b7b8d'}}>Val. Aprov. p/ Captação</span><span className="mono" style={{fontWeight:700,color:'#14b8a6',textAlign:'right',fontSize:11}}>{fmt(hoverInfo.data.vApC)}</span>
                    <span style={{color:'#6b7b8d'}}>Val. Captado</span><span className="mono" style={{fontWeight:700,color:'#22d3ee',textAlign:'right',fontSize:11}}>{fmt(hoverInfo.data.vC)}</span>
                    <span style={{color:'#6b7b8d'}}>Val. Equip.</span><span className="mono" style={{fontWeight:700,color:'#e8ecf1',textAlign:'right',fontSize:11}}>{fmt(hoverInfo.data.eV||0)}</span>
                  </div>
                </div>
              )}
              {hoverInfo&&hoverInfo.type==='pin'&&(()=>{const p=hoverInfo.data;return(
                <div>
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:16,fontWeight:800,color:'#f59e0b'}}>{p.mun}</div>
                    <div style={{fontSize:11,color:'#6b7b8d'}}>{p.uf}</div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'6px 12px',fontSize:12}}>
                    <span style={{color:'#6b7b8d'}}>Projetos</span><span className="mono" style={{fontWeight:700,color:'#e8ecf1',textAlign:'right'}}>{p.total||p.n||0}</span>
                    {p.equip!=null&&<><span style={{color:'#6b7b8d'}}>Com equipamento</span><span className="mono" style={{fontWeight:700,color:'#14b8a6',textAlign:'right'}}>{p.equip}</span></>}
                    <span style={{color:'#6b7b8d'}}>Val. Aprov. p/ Captação</span><span className="mono" style={{fontWeight:700,color:'#14b8a6',textAlign:'right',fontSize:11}}>{fmt(p.valAprov||0)}</span>
                    <span style={{color:'#6b7b8d'}}>Val. Captado</span><span className="mono" style={{fontWeight:700,color:'#22d3ee',textAlign:'right',fontSize:11}}>{fmt(p.valCaptado||0)}</span>
                  </div>
                  {p.eqTypes&&Object.keys(p.eqTypes).length>0&&(<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid rgba(255,255,255,.07)'}}>
                    <div style={{fontSize:9,color:'#556677',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Equipamentos</div>
                    {Object.entries(p.eqTypes).map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:2}}><span style={{color:'#a0b4c8'}}>{k}</span><span className="mono" style={{fontWeight:600}}>{v}</span></div>)}
                  </div>)}
                </div>
              );})()}
              {!hoverInfo&&(
                <div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                    <div style={{fontSize:16,fontWeight:800,color:titleColor,fontFamily:"'JetBrains Mono'"}}>{scopeLabel}</div>
                    <div style={{fontSize:9,color:'#556677',textTransform:'uppercase',letterSpacing:.8}}>{eqFilter!=='all'?eqFilter:'Todos os equip.'}</div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'6px 12px',fontSize:12,marginBottom:10}}>
                    <span style={{color:'#6b7b8d'}}>Municípios</span><span className="mono" style={{fontWeight:700,color:'#e8ecf1',textAlign:'right'}}>{totalMun}</span>
                    <span style={{color:'#6b7b8d'}}>Projetos c/ equip.</span><span className="mono" style={{fontWeight:700,color:'#f59e0b',textAlign:'right'}}>{totalProj}</span>
                    <span style={{color:'#6b7b8d'}}>Total equipamentos</span><span className="mono" style={{fontWeight:700,color:'#14b8a6',textAlign:'right'}}>{totalEquip}</span>
                    <span style={{color:'#6b7b8d'}}>Val. Aprov. p/ Captação</span><span className="mono" style={{fontWeight:700,color:'#14b8a6',textAlign:'right',fontSize:11}}>{fmt(totalVal)}</span>
                    <span style={{color:'#6b7b8d'}}>Val. Captado</span><span className="mono" style={{fontWeight:700,color:'#22d3ee',textAlign:'right',fontSize:11}}>{fmt(totalCaptado)}</span>
                  </div>
                  {eqEntries.length>0&&(
                    <div style={{paddingTop:8,borderTop:'1px solid rgba(255,255,255,.07)'}}>
                      <div style={{fontSize:9,color:'#556677',textTransform:'uppercase',letterSpacing:.8,marginBottom:5}}>Por tipo</div>
                      {eqEntries.slice(0,5).map(([k,v])=>(
                        <div key={k} style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                          <div style={{width:6,height:6,borderRadius:2,background:EQUIP_COLORS[k]||'#64748b',flexShrink:0}}/>
                          <span style={{fontSize:10,color:'#a0b4c8',flex:1}}>{k}</span>
                          <span className="mono" style={{fontSize:10,fontWeight:700,color:'#e8ecf1'}}>{v}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })()}
        {/* ── RANKING UF / MUNICÍPIOS ── */}
        <div className="card" style={{flex:1,overflow:'hidden'}}>
          {!selectedUF&&(<>
            <div style={{fontSize:15,fontWeight:700,color:'#e8ecf1',marginBottom:12}}>Ranking UF <span style={{fontSize:10,color:'#556677',fontWeight:400}}>· clique no mapa p/ detalhar</span></div>
            {Object.entries(UD).filter(([,d])=>d[metric]>0).sort((a,b)=>b[1][metric]-a[1][metric]).slice(0,12).map(([uf,d],i)=>{
              const pct2=(d[metric]/maxVal)*100;
              return(<div key={uf} style={{marginBottom:8,cursor:'pointer',opacity:hover&&hover!==uf ? 0.5 : 1,transition:'opacity .2s'}} onMouseEnter={()=>setHover(uf)} onMouseLeave={()=>setHover(null)} onClick={()=>setSelectedUF(uf)}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                  <span style={{fontSize:12}}><span style={{color:'#556677',fontFamily:"'JetBrains Mono'",fontSize:11,marginRight:6}}>{i+1}.</span><span style={{fontWeight:700,color:i<3?'#5cb8ff':'#a0b4c8'}}>{uf}</span></span>
                  <span className="mono" style={{fontSize:12,fontWeight:700}}>{metric.startsWith('v')?fmt(d[metric]):d[metric]}</span>
                </div>
                <div style={{height:5,borderRadius:3,background:'rgba(255,255,255,.06)',overflow:'hidden',marginLeft:24}}>
                  <div style={{width:`${pct2}%`,height:'100%',borderRadius:3,background:i<3?'linear-gradient(90deg,#1a7fc4,#2cb5a0)':'rgba(26,127,196,.4)',transition:'width .5s'}}/>
                </div>
              </div>);
            })}
          </>)}
          {selectedUF&&(<>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <button onClick={()=>setSelectedUF(null)} style={{background:'rgba(92,184,255,.15)',border:'1px solid rgba(92,184,255,.3)',borderRadius:8,color:'#5cb8ff',cursor:'pointer',fontSize:11,padding:'3px 10px'}}>← Voltar</button>
              <div style={{fontSize:15,fontWeight:700,color:'#f59e0b'}}>Municípios — {selectedUF}</div>
            </div>
            {(!munRanking||munRanking.length===0)&&(
              <div style={{fontSize:12,color:'#556677',textAlign:'center',paddingTop:20}}>Nenhum município contemplado</div>
            )}
            {munRanking&&munRanking.length>0&&(()=>{
              const maxE=munRanking[0].equip;
              return munRanking.map((p,i)=>(
                <div key={p.mun+i} style={{marginBottom:9,cursor:'pointer',opacity:hover&&hover!==('pin_'+visiblePins.findIndex(vp=>vp.mun===p.mun&&vp.uf===p.uf)) ? 0.6 : 1,transition:'opacity .2s'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:2}}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{color:'#556677',fontFamily:"'JetBrains Mono'",fontSize:10}}>{i+1}.</span>
                      <span style={{fontSize:12,fontWeight:700,color:i<3?'#f59e0b':'#a0b4c8'}}>{p.mun}</span>
                    </div>
                    <div style={{display:'flex',gap:10}}>
                      <span style={{fontSize:10,color:'#14b8a6',fontWeight:700}}>{p.equip} equip.</span>
                      <span className="mono" style={{fontSize:10,color:'#14b8a6'}}>{fmt(p.valAprov)}</span>
                    </div>
                  </div>
                  <div style={{height:4,borderRadius:3,background:'rgba(255,255,255,.06)',overflow:'hidden',marginLeft:20}}>
                    <div style={{width:`${(p.equip/maxE)*100}%`,height:'100%',borderRadius:3,background:i<3?'linear-gradient(90deg,#f59e0b,#ef4444)':'rgba(245,158,11,.4)',transition:'width .5s'}}/>
                  </div>
                  {p.eqTypes&&Object.keys(p.eqTypes).length>0&&(
                    <div style={{display:'flex',flexWrap:'wrap',gap:3,marginTop:3,marginLeft:20}}>
                      {Object.entries(p.eqTypes).map(([k,v])=>(
                        <span key={k} style={{fontSize:9,background:'rgba(255,255,255,.06)',borderRadius:4,padding:'1px 5px',color:'#6b7b8d'}}>{k}: {v}</span>
                      ))}
                    </div>
                  )}
                </div>
              ));
            })()}
          </>)}
        </div>
      </div>
    </div>
  </div>);
}

/* ═══ MAIN APP ═══ */
function App(){
  const [tab,setTab]=useState(0);
  const TABS=['Visão Geral','Equipamentos','Valores p/ Equip.','Ciclos','Financeiro','Geografia'];
  const panels=[TabOverview,TabEquip,TabEquipVal,TabCiclos,TabFinanceiro,TabGeo];
  const Panel=panels[tab];

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(145deg,#0a1628,#0f1f35 40%,#0a1628)'}}>
      <div style={{padding:'20px 28px 0',borderBottom:'1px solid rgba(255,255,255,.06)',background:'rgba(0,0,0,.2)'}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
          <div style={{width:40,height:40,borderRadius:12,background:'linear-gradient(135deg,#1a7fc4,#2cb5a0)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:800,color:'#fff'}}>P</div>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:'#e8ecf1'}}>PRONON <span style={{fontWeight:400,color:'#4a5568'}}>|</span> <span style={{fontWeight:400,fontSize:14,color:'#7a8a9a'}}>Painel Analítico</span></div>
            <div style={{fontSize:11,color:'#4a5568'}}>CGPROJ/SAES/MS · 408 projetos · Ciclos 2023–2025</div>
          </div>
        </div>
        <div style={{display:'flex',gap:0,overflowX:'auto'}}>
          {TABS.map((t,i)=><button key={i} className={`tab-btn ${tab===i?'active':''}`} onClick={()=>setTab(i)}>{t}</button>)}
        </div>
      </div>
      <div style={{padding:'24px 28px',maxWidth:1280,margin:'0 auto'}}>
        <Panel/>
      </div>
      <div style={{padding:'16px 28px',marginTop:24,borderTop:'1px solid rgba(255,255,255,.04)',textAlign:'center',fontSize:10,color:'#2d3d4d'}}>
        PRONON · Programa Nacional de Apoio à Atenção Oncológica · CGPROJ/SAES/Ministério da Saúde · Março/2026
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
